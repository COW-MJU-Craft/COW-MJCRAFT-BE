spring:
  application:
    name: cowmjucraft
  jackson:
    time-zone: Asia/Seoul
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul

server:
  port: 8080

aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    endpoint: ${AWS_S3_ENDPOINT}
    public-endpoint: ${AWS_S3_PUBLIC_ENDPOINT}
    bucket: ${AWS_S3_BUCKET}


management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
