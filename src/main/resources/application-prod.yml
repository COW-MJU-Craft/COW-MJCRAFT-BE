spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    # 기존 운영 DB(테이블 존재)는 V1을 실행하지 않고 기준점(1)만 기록.
    # 빈 DB에서는 V1부터 전부 실행됨.
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT}
    public-endpoint: ${AWS_S3_PUBLIC_ENDPOINT}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL}
  order-view-path: ${APP_ORDER_VIEW_PATH}
  order-view-token-ttl-minutes: ${APP_ORDER_VIEW_TOKEN_TTL_MINUTES}

mail:
  from: ${MAIL_FROM}
  from-name: ${MAIL_FROM_NAME}

admin:
  login-id: ${ADMIN_LOGIN_ID}
  password: ${ADMIN_PASSWORD}
  email: ${ADMIN_EMAIL:}

jwt:
  secret: ${JWT_SECRET}
  access-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS}
  refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS}
