# CI/테스트 환경용 설정 — MySQL·AWS·외부 서비스 없이 context 로드 가능하게

spring:
  application:
    name: cowmjucraft
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false  # H2 단위 테스트는 create-drop 사용. MySQL 마이그레이션 검증은 Testcontainers 테스트가 담당
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  mail:
    host: localhost
    port: 25
    username: test
    password: test

  cloud:
    aws:
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key
      region:
        static: ap-northeast-2

server:
  port: 8080

aws:
  region: ap-northeast-2
  s3:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    bucket: test-bucket

app:
  public-base-url: http://localhost:8080
  order-view-path: /orders/view
  order-view-token-ttl-minutes: 60

mail:
  from: test@test.com
  from-name: 테스트
  outbox:
    enabled: false

admin:
  login-id: admin
  password: Test1234!
  email: admin@test.com

jwt:
  secret: test-secret-key-for-ci-only-minimum-256-bits-long
  access-expiration-seconds: 3600
  refresh-expiration-seconds: 1209600
