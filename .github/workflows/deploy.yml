name: Build & Push to ghcr.io

# main push 직접 트리거 대신 CI 성공 이후에만 실행
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # CI가 성공한 경우에만 배포
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      IMAGE: ghcr.io/cow-mju-craft/cowmjucraft

    steps:
      - uses: actions/checkout@v4
        with:
          # CI가 검증한 바로 그 커밋을 빌드 (트리거 시점의 main HEAD가 아니라)
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -fSs -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
