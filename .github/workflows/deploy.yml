name: Build & Push to ghcr.io

# main push 직접 트리거 대신 CI 성공 이후에만 실행
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # CI가 성공한 경우에만 배포
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      IMAGE: ghcr.io/cow-mju-craft/cowmjucraft

    steps:
      - uses: actions/checkout@v4
        with:
          # CI가 검증한 바로 그 커밋을 빌드 (트리거 시점의 main HEAD가 아니라)
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -fSs -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Verify deployment (smoke check)
        run: |
          BASE_URL="${{ vars.PROD_BASE_URL || 'https://api.mju-craft.shop' }}"
          echo "smoke target: ${BASE_URL}/api/projects"
          # Coolify 배포·컨테이너 기동 대기 후 운영 API가 "실제 JSON"을 반환하는지 확인.
          # HTTP 200만 보면 안 됨 — 프런트 도메인은 SPA fallback이 모든 경로에 200 HTML을 반환함.
          ok=""
          for i in $(seq 1 20); do
            sleep 15
            body=$(curl -s --max-time 10 "${BASE_URL}/api/projects" || echo "")
            if echo "$body" | grep -q '"resultType":"SUCCESS"'; then
              echo "attempt ${i}/20: JSON OK"
              ok=1
              break
            fi
            echo "attempt ${i}/20: 아직 JSON 응답 아님"
          done
          if [ -z "$ok" ]; then
            echo "::error::배포 후 smoke check 실패 — 운영 API가 5분 내 200을 반환하지 않음"
            exit 1
          fi
          echo "smoke check OK"
