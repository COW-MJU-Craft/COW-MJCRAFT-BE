name: CI

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport

      - name: Diff coverage gate (변경 코드 70% 이상)
        if: github.event_name == 'pull_request'
        run: |
          pip install diff-cover
          git fetch origin ${{ github.base_ref }}
          diff-cover build/reports/jacoco/test/jacocoTestReport.xml \
            --compare-branch origin/${{ github.base_ref }} \
            --src-roots src/main/java \
            --fail-under=70

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (시크릿 스캔)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source /repo --no-banner --redact --exit-code 1

  agent-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 에이전트 설정 구조 검증 (심링크/CLAUDE.md)
        run: |
          set -e
          test -d .agents/commands || { echo "::error::.agents/commands 없음"; exit 1; }
          test -L .claude/commands && test -e .claude/commands || { echo "::error::.claude/commands 심링크 깨짐"; exit 1; }
          test -L .codex/commands && test -e .codex/commands || { echo "::error::.codex/commands 심링크 깨짐"; exit 1; }
          grep -q "@AGENTS.md" CLAUDE.md || { echo "::error::CLAUDE.md에 @AGENTS.md import 없음"; exit 1; }
          echo "OK"
