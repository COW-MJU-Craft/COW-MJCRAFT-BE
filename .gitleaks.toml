# gitleaks 설정 — 기본 룰셋 확장
[extend]
useDefault = true

[allowlist]
description = "오탐 제외"
paths = [
  # 테스트 전용 더미 자격증명 (실제 시크릿 아님)
  '''src/test/resources/.*''',
  # pre-commit 훅 자체의 탐지 패턴 문자열
  '''\.githooks/.*''',
]
# Swagger @ExampleObject의 잘린 예시 JWT ("eyJ...." 로 끝나는 것만).
# 실제 토큰은 "..."로 끝나지 않으므로 진짜 유출은 계속 탐지된다.
regexTarget = "line"
regexes = [
  '''eyJ[A-Za-z0-9_-]+\.{3}''',
]
